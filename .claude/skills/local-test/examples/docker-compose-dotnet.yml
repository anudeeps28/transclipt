# Local development emulators for YOUR_PROJECT_NAME
# Used by local-test.ps1 (Level 2+)
#
# Azure SQL Edge      → replaces Azure SQL Database
# Azurite             → replaces Azure Blob Storage
# Embedding Service   → same container as production (all-MiniLM-L6-v2, 384 dims)

services:
  sql-edge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: local-sql-edge
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "LocalDev#2026!"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'LocalDev#2026!' -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: local-azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck"
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table

  embedding-service:
    build:
      context: ../../../services/embedding-service
      dockerfile: Dockerfile
    container_name: local-embedding
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s